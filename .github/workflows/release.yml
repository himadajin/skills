name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure the workflow runs from main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Releases must be run from main (got ${GITHUB_REF})."
          exit 1

      - uses: actions/checkout@v4

      - name: Validate skills
        run: python3 scripts/validate_skills.py

      - name: Compute CalVer tag
        id: tag
        run: |
          git fetch --tags --quiet
          base="v$(TZ=Asia/Tokyo date +%Y.%m.%d)"
          tag="$base"
          n=0
          while git rev-parse --quiet --verify "refs/tags/$tag" > /dev/null; do
            n=$((n + 1))
            tag="$base.$n"
          done
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Releasing as $tag"

      - name: Build skill zips
        run: |
          mkdir -p dist
          for dir in skills/*/; do
            name="$(basename "$dir")"
            (cd skills && zip -r -q "../dist/$name.zip" "$name" -x '*.DS_Store')
          done
          ls -l dist

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.tag.outputs.tag }}" \
            --generate-notes \
            dist/*.zip
